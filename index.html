<style>
  :root {
    --bg: #0E0E10; --card: #18181C; --card2: #1E1E24;
    --accent: #C8A96E; --text: #F0EDE8; --muted: #7A7680;
    --border: #2A2A32; --booked: #3A3A42; --booked-text: #5A5A65;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

  header { background: #18181C; border-bottom: 1px solid var(--border); padding: 28px 20px 20px; text-align: center; position: sticky; top: 0; z-index: 10; }
  .crown { font-size: 26px; display: block; margin-bottom: 6px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); margin-bottom: 3px; }
  header p { font-size: 12px; color: var(--muted); }
  .stats { display: flex; justify-content: center; gap: 28px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px; max-width: 520px; margin: 0 auto; }

  .card { background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; }
  .card:not(.booked):hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .card.booked { opacity: 0.55; }

  .img-wrap { position: relative; width: 100%; aspect-ratio: 1; overflow: hidden; background: var(--card2); }
  .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-emoji { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 44px; }
  .booked-badge { position: absolute; top: 8px; right: 8px; background: rgba(14,14,16,0.85); color: var(--muted); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); }

  .card-body { padding: 10px 11px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .card-name { font-size: 12px; font-weight: 700; line-height: 1.35; color: var(--text); }
  .card-sub { font-size: 10px; color: var(--muted); line-height: 1.3; }
  .card-specs { font-size: 10px; color: var(--accent); font-weight: 600; line-height: 1.4; margin-top: 2px; }
  .card-footer { margin-top: auto; padding-top: 8px; display: flex; flex-direction: column; gap: 5px; }

  .btn-book { width: 100%; padding: 7px; border-radius: 8px; border: none; background: var(--accent); color: #0E0E10; font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; transition: background 0.15s; }
  .btn-book:hover:not(:disabled) { background: #d4b87a; }
  .btn-book.booked { background: var(--booked); color: var(--booked-text); cursor: default; }
  .btn-link { width: 100%; padding: 6px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 10px; font-weight: 600; font-family: 'Nunito', sans-serif; text-align: center; text-decoration: none; display: block; transition: border-color 0.15s, color 0.15s; }
  .btn-link:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; animation: fadein 0.2s; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); padding: 20px 20px 44px; width: 100%; max-width: 520px; animation: slideup 0.25s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes slideup { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 10px; margin-bottom: 14px; background: var(--card2); }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .modal-specs-block { background: rgba(200,169,110,0.08); border: 1px solid rgba(200,169,110,0.2); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
  .modal-specs-title { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .modal-spec-row { font-size: 12px; color: var(--text); line-height: 1.6; }
  .modal-spec-row span { color: var(--muted); }
  .modal-note { font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 14px; margin-bottom: 18px; line-height: 1.5; }
  .modal-btns { display: flex; flex-direction: column; gap: 8px; }
  .modal-link { display: block; text-align: center; padding: 10px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 10px; transition: border-color 0.15s, color 0.15s; }
  .modal-link:hover { border-color: var(--accent); color: var(--accent); }
  .btn-confirm { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #0E0E10; font-size: 15px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; }
  .btn-confirm:disabled { opacity: 0.6; cursor: default; }
  .btn-cancel { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-family: 'Nunito', sans-serif; cursor: pointer; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A3320; border: 1px solid #2D5535; color: #7AC98A; padding: 11px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 200; white-space: nowrap; transition: transform 0.3s, opacity 0.3s; opacity: 0; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>

async function loadFromSheets() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=wishlist&_=${Date.now()}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map((r, idx) => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = r.c[i] ? r.c[i].v : ''; });
    return {
      id:     String(obj.id || idx + 1),
      name:   obj.name  || '',
      sub:    obj.sub   || '',
      price:  obj.price || '',
      link:   obj.link  || '',
      img:    obj.img   || '',
      booked: obj.booked === true || String(obj.booked).toUpperCase() === 'TRUE',
      specs:  obj.specs ? obj.specs.split('|') : [],
      emoji:  '🎁'
    };
  });
}

function updateStats() {
  const total = items.length;
  const taken = items.filter(i => i.booked).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-free').textContent  = total - taken;
  document.getElementById('s-taken').textContent = taken;
}

function render() {
  document.getElementById('grid').innerHTML = items.map(item => {
    const isBooked = item.booked;
    const imgHtml = item.img
      ? `<img class="card-img" src="${item.img}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-emoji" style="display:none">${item.emoji}</div>`
      : `<div class="card-emoji">${item.emoji}</div>`;
    const specsPreview = item.specs && item.specs.length
      ? `<div class="card-specs">📋 ${item.specs[0]}</div>` : '';
    return `
      <div class="card ${isBooked ? 'booked' : ''}" onclick="openModal('${item.id}')">
        <div class="img-wrap">
          ${imgHtml}
          ${isBooked ? '<div class="booked-badge">Занято ✓</div>' : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          ${item.sub ? `<div class="card-sub">${item.sub}</div>` : ''}
          ${specsPreview}
          <div class="card-footer">
            <button class="btn-book ${isBooked ? 'booked' : ''}" onclick="event.stopPropagation();openModal('${item.id}')" ${isBooked ? 'disabled' : ''}>
              ${isBooked ? '✓ Забронировано' : 'Забронировать'}
            </button>
            ${item.link ? `<a class="btn-link" href="${item.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Посмотреть →</a>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
  updateStats();
}

function openModal(id) {
  const item = items.find(i => i.id === String(id));
  if (!item) return;
  pendingId = id;

  const mImg = document.getElementById('m-img');
  if (item.img) { mImg.src = item.img; mImg.style.display = 'block'; }
  else { mImg.style.display = 'none'; }

  document.getElementById('m-title').textContent = item.name;

  const specsBlock = document.getElementById('m-specs-block');
  const specsEl = document.getElementById('m-specs');
  if (item.specs && item.specs.length) {
    specsEl.innerHTML = item.specs.map(s => `<div class="modal-spec-row">${s}</div>`).join('');
    specsBlock.style.display = 'block';
  } else {
    specsBlock.style.display = 'none';
  }

  const mLink = document.getElementById('m-link');
  if (item.link) { mLink.href = item.link; mLink.style.display = 'block'; }
  else { mLink.style.display = 'none'; }

  const btn = document.getElementById('m-confirm');
  if (item.booked) {
    btn.textContent = '✓ Уже забронировано';
    btn.disabled = true;
  } else {
    btn.textContent = 'Забронировать';
    btn.disabled = false;
  }

  document.getElementById('overlay').classList.add('open');
}

document.getElementById('m-confirm').onclick = async () => {
  if (!pendingId) return;
  const item = items.find(i => i.id === String(pendingId));
  if (!item || item.booked) return;

  const btn = document.getElementById('m-confirm');
  btn.disabled = true;
  btn.textContent = 'Бронируем...';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: pendingId })
    });
    item.booked = true;
    pendingId = null;
    document.getElementById('overlay').classList.remove('open');
    render();
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Забронировать';
  }
};

document.getElementById('m-cancel').onclick = () => {
  pendingId = null;
  document.getElementById('overlay').classList.remove('open');
};
document.getElementById('overlay').onclick = e => {
  if (e.target === e.currentTarget) {
    pendingId = null;
    e.currentTarget.classList.remove('open');
  }
};

// init + auto-refresh
async function init() {
  try {
    items = await loadFromSheets();
    render();
  } catch(e) {
    console.error(e);
    document.getElementById('grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Не удалось загрузить список.<br><button onclick="init()" style="margin-top:12px;padding:8px 20px;border-radius:20px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer">Попробовать снова</button></div>`;
  }
}

setInterval(async () => {
  try {
    const fresh = await loadFromSheets();
    fresh.forEach(f => {
      const local = items.find(i => i.id === f.id);
      if (local) local.booked = f.booked;
    });
    render();
  } catch(e) {}
}, 30000);

init();

</script>
